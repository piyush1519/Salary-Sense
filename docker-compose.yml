version: "3.9"

services:

  # ─── MongoDB ──────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: salarysense-mongo
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}

    volumes:
      - mongo_data:/data/db

    ports:
      - "27017:27017"

    networks:
      - salarysense-net

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ─── ML Service ───────────────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile

    container_name: salarysense-ml
    restart: unless-stopped

    environment:
      PYTHONUNBUFFERED: 1

    volumes:
      - ml_models:/app/models
      - ml_data:/app/data

    ports:
      - "${ML_PORT}:8000"

    networks:
      - salarysense-net

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s


  # ─── Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: salarysense-backend
    restart: unless-stopped

    depends_on:
      mongodb:
        condition: service_healthy

      ml-service:
        condition: service_healthy

    environment:
      PORT: ${BACKEND_PORT}
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}

      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin

      ML_SERVICE_URL: http://ml-service:8000

      FRONTEND_URL: ${FRONTEND_URL}

    ports:
      - "${BACKEND_PORT}:5000"

    networks:
      - salarysense-net

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5000/health').then(()=>process.exit(0)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s


  # ─── Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}

    container_name: salarysense-frontend
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "${FRONTEND_PORT}:3000"

    networks:
      - salarysense-net


  # ─── Nginx ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: salarysense-nginx
    restart: unless-stopped

    ports:
      - "${NGINX_PORT}:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - frontend
      - backend

    networks:
      - salarysense-net


volumes:
  mongo_data:
  ml_models:
  ml_data:


networks:
  salarysense-net:
    driver: bridge